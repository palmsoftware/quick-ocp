name: Nightly Test

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-ocp:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
        ocp: ['4.18', '4.19', '4.20', '4.21', '4.22', 'latest']
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Check Red Hat Status
        uses: palmsoftware/redhat-status@v0
        with:
          components: |
            api.openshift.com
            developers.redhat.com

      - name: Checkout the code
        uses: actions/checkout@v7

      - name: check if OCP_PULL_SECRET exists
        env: 
          super_secret: ${{ secrets.OCP_PULL_SECRET }}
        if: ${{ env.super_secret == '' }}
        run: 'echo the secret \"OCP_PULL_SECRET\" has not been made; echo please go to \"settings \> secrets \> actions\" to create it'

      - name: Run the action
        uses: ./
        with:
          ocpPullSecret: $OCP_PULL_SECRET
          bundleCache: true
          desiredOCPVersion: ${{ matrix.ocp }}
        env:
          OCP_PULL_SECRET: ${{ secrets.OCP_PULL_SECRET }}
